name: Publish to npm

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build project
        run: npm run build

      - name: Check version changes
        id: version_check
        run: |
          # Get the package version
          PACKAGE_VERSION=$(node -p "require('./package.json').version")

          # Get the last published version from npm
          LAST_PUBLISHED=$(npm view gmail-mcp-server version 2>/dev/null || echo "0.0.0")

          echo "package_version=$PACKAGE_VERSION" >> $GITHUB_OUTPUT
          echo "last_published=$LAST_PUBLISHED" >> $GITHUB_OUTPUT

          # Check if version has changed
          if [ "$PACKAGE_VERSION" != "$LAST_PUBLISHED" ]; then
            echo "should_publish=true" >> $GITHUB_OUTPUT
            echo "New version detected: $PACKAGE_VERSION (last published: $LAST_PUBLISHED)"
          else
            echo "should_publish=false" >> $GITHUB_OUTPUT
            echo "No version change detected: $PACKAGE_VERSION"
          fi

      - name: Publish to npm
        id: publish
        if: steps.version_check.outputs.should_publish == 'true'
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: steps.publish.outcome == 'success'
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.version_check.outputs.package_version }}
          release_name: Release v${{ steps.version_check.outputs.package_version }}
          body: |
            ## Changes
            Published version ${{ steps.version_check.outputs.package_version }} to npm.
          draft: false
          prerelease: false
